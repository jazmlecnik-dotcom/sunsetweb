<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Cards - Sunset</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <style>
        /* --- ESTILO PARA EL BANNER COMPACTO --- */
        .banner-gift { 
            width: 100%; 
            height: 320px; /* <--- CORREGIDO: Reducido de 1000px a 320px */
            max-width: 800px; 
            display: block;
            margin: 0 auto 25px auto; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
        }
        
        /* --- ESTILO PARA EL TÍTULO CENTRADO Y MÁS GRANDE --- */
        .titulo-giftcards {
            text-align: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444444;
            margin-top: 20px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .container-pantalla {
            max-width: 800px; 
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header class="header-sunset">
        <a href="../home-2.html" class="btn-volver">❮</a>
        <img src="../../assets/imagenes/logo-sin-fondo-01.png" alt="Sunset" class="logo-studio">
    </header>
    
    <main class="container-pantalla">
        <h1 class="titulo-giftcards">Gift Cards</h1>

        <img src="../../assets/imagenes/giftcard-banner.jpg" alt="Giftcards" class="banner-gift">
        
        <div class="bloque-input-grupo" style="text-align: center; padding: 25px 15px; max-width: 600px; margin: 0 auto 20px auto;">
            <p style="font-family: Georgia, serif; font-style: italic; font-size: 20px; margin-bottom: 15px;">“Regalá arte para toda la vida”</p>
            <p style="font-size: 17px; color: #444; line-height: 1.4;">Adquirí tarjetas de regalo físicas o virtuales por el monto que desees para canjear en cualquier diseño.</p>
        </div>
        
        <!-- CORREGIDO: Link de WhatsApp actualizado con la clase .enlace-contacto añadida -->
        <a href="https://api.whatsapp.com/message/IM2OMFI7QBLSD1?autoload=1&app_absent=0&utm_source=ig" 
        target="_blank" class="btn-shadow enlace-contacto" style="width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="../../assets/iconos/wpp-icon.png" width="28" alt="wpp"> Consultar por WhatsApp
        </a>
    </main>
</body>
</html>
