<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Tattoo Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .welcome-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('assets/imagenes/tattoo14.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFFFFF;
        }
        .welcome-bg h2 {
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .logo-welcome {
            width: 260px;
            margin-bottom: 50px;
        }
        .btn-iniciar {
            background-color: #FFFFFF;
            color: #000000;
            padding: 15px 80px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <main class="welcome-bg">
        <h2>Bienvenido a</h2>
        <img src="assets/imagenes/logo-blanco.jpg" alt="Sunset Tattoo" class="logo-welcome">
        <a href="pages/home-2.html" class="btn-iniciar">Iniciar</a>
    </main>
</body>
</html>
